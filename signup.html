<script>
// Counter animation
$(document).ready(function() {
    $('[data-value]').each(function() {
        const $el = $(this);
        const val = $el.data('value');
        const duration = $el.data('animation-duration') || 2000;
        $el.text('0');
        $el.waypoint(function() {
            $el.prop('Counter', 0).animate({
                Counter: val
            }, {
                duration: duration,
                easing: 'swing',
                step: function (now) {
                    $el.text(Math.ceil(now));
                }
            });
            this.destroy();
        }, { offset: '80%' });
    });
});
</script>
